name: NothingsVN Xiaomi ROM Build

on:
  workflow_dispatch:
    inputs:
      input_url:
        description: 'URL of the ROM to build'
        required: false
      builder_name:
        description: 'Tên người build'
        required: false
      builder_id:
        description: 'ID người build'
        required: false
      
jobs:
  Initialize:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        device: [myron, socrates]
        region: [China, EEA]
        exclude:
          - device: socrates
            region: EEA
      fail-fast: false
    name: Build ROM (${{ matrix.device }} - ${{ matrix.region }})
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
    steps:
      - name: Clean All Unused file,application
        run: |
          docker rmi `docker images -q` || true
          sudo rm -rf /usr/share/dotnet /etc/sudo apt/sources.list.d || true
          sudo apt -y purge azure-cli ghc* zulu* hhvm llvm* firefox google* dotnet* powershell || true
          sudo apt -y autoremove --purge || true
          sudo apt -y autoclean || true
          sudo apt clean || true

      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024
          root-reserve-mb: 512
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'

      - name: Set up Time
        run: |
          echo "Setting Vienam timezone"
          sudo timedatectl set-timezone Asia/Ho_Chi_Minh
          
      - name: Install OpenJDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Checkout repository
        uses: actions/checkout@main

      - name: Install Stuff
        run: |
          sudo bash setup.sh

          sudo apt-get update
          sudo apt-get install -y p7zip-full jq curl python3-pip unzip libc++1 libc++-dev bsdextrautils zstd bc zip

          pip3 install requests beautifulsoup4

          echo "📦 Installing xmlstarlet..."

          if ! command -v xmlstarlet >/dev/null 2>&1; then
            sudo add-apt-repository universe -y || true
            sudo apt-get update

            if sudo apt-get install -y xmlstarlet; then
              echo "✅ Installed xmlstarlet via apt"
            else
              echo "⚠️ Apt failed, trying snap..."

              if sudo snap install xmlstarlet; then
                echo "✅ Installed xmlstarlet via snap"
                sudo ln -sf /snap/bin/xmlstarlet /usr/local/bin/xmlstarlet || true
              else
                echo "⚠️ Snap failed, building from source..."

                wget -qO xmlstarlet.tar.gz https://sourceforge.net/projects/xmlstar/files/xmlstarlet/1.6.1/xmlstarlet-1.6.1.tar.gz/download

                tar -xzf xmlstarlet.tar.gz
                cd xmlstarlet-1.6.1

                ./configure
                make -j$(nproc)

                sudo make install

                cd ..
                rm -rf xmlstarlet-1.6.1 xmlstarlet.tar.gz

                echo "✅ Installed xmlstarlet from source"
              fi
            fi
          fi

          xmlstarlet --version || true

          echo "⬇️ Đang tải Android Command Line Tools từ Google..."
          curl -sLo cmd-tools.zip "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"

          echo "📦 Đang cấu hình sdkmanager..."
          unzip -q cmd-tools.zip -d cmd-tools-dir
          mkdir -p android-sdk/cmdline-tools
          mv cmd-tools-dir/cmdline-tools android-sdk/cmdline-tools/latest

          echo "🤖 Đang tải Build-Tools 34.0.0 chính chủ từ Google Android SDK..."
          echo "y" | ./android-sdk/cmdline-tools/latest/bin/sdkmanager --sdk_root=$(pwd)/android-sdk "build-tools;34.0.0" "platform-tools" > /dev/null

          echo "$(pwd)/android-sdk/build-tools/34.0.0" >> $GITHUB_PATH
          echo "$(pwd)/android-sdk/platform-tools" >> $GITHUB_PATH

          sudo ldconfig
          export PATH="$(pwd)/android-sdk/build-tools/34.0.0:$PATH"

          echo "🔍 Kiểm tra zipalign..."
          which zipalign || true
          which aapt || true
          ldd android-sdk/build-tools/34.0.0/zipalign || true

          echo "✅ Zipalign hoạt động bình thường"
          sudo ln -sf "$(pwd)/android-sdk/build-tools/34.0.0/zipalign" /usr/local/bin/zipalign
          sudo ln -sf "$(pwd)/android-sdk/build-tools/34.0.0/aapt" /usr/local/bin/aapt


      - name: Giving permission
        run: |
          sudo chmod 777 -R *

      - name: Fetch Latest ROM URL
        id: fetch_rom
        run: |
          python3 - <<EOF
          import requests
          from bs4 import BeautifulSoup
          import os
          import re

          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
          }
          
          target_device = "${{ matrix.device }}"
          target_region = "${{ matrix.region }}"
          base_url = "https://hyperosroms.com"
          model_url = f"{base_url}/model/{target_device}"
          
          res = requests.get(model_url, headers=headers, timeout=15)
          if res.status_code != 200:
              print(f"❌ Không thể truy cập danh sách ROM thiết bị {target_device} vùng {target_region}")
              exit(1)
              
          soup = BeautifulSoup(res.text, 'html.parser')
          rows = soup.find_all('tr')
          sub_page_url = ""

          for row in rows:
              cells = row.find_all('td')
              if len(cells) >= 5:
                  region_text = cells[1].get_text(strip=True)
                  type_text = cells[2].get_text(strip=True).lower()
                  
                  if region_text == target_region and type_text == "recovery":
                      link_tag = cells[0].find('a') or cells[-1].find('a')
                      if link_tag and 'href' in link_tag.attrs:
                          sub_page_url = base_url + link_tag['href'] if link_tag['href'].startswith('/') else link_tag['href']
                          break

          if not sub_page_url:
              print(f"❌ Không tìm thấy sub-page ROM phù hợp cho {target_device} ({target_region})")
              exit(1)

          res_sub = requests.get(sub_page_url, headers=headers, timeout=15)
          soup_sub = BeautifulSoup(res_sub.text, 'html.parser')
          
          package_name = ""
          for li in soup_sub.find_all(['li', 'p']):
              text = li.get_text()
              if "Package Name:" in text:
                  package_name = text.split("Package Name:")[-1].strip()
                  break
                  
          if not package_name:
              match = re.search(r'([\w-]+\.zip)', res_sub.text)
              if match:
                  package_name = match.group(1)

          if not package_name:
              print(f"❌ Không tìm thấy tên gói ZIP hợp lệ cho {target_device}")
              exit(1)

          version_code = sub_page_url.split('/')[-1]
          high_speed_url = f"https://bkt-sgp-miui-ota-update-alisgp.oss-ap-southeast-1.aliyuncs.com/{version_code}/{package_name}"
          
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"AUTO_INPUT_URL={high_speed_url}\n")
              f.write(f"ROM_FILE={package_name}\n")
          EOF

      - name: Build ROM...
        env:
          INPUT_URL: ${{ inputs.input_url || env.AUTO_INPUT_URL }}
        run: |
          sudo -E bash build.sh "$INPUT_URL" "${{ github.repository }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"

      - name: Pack ROM...
        run: |
          sudo bash packROM.sh

      - name: Upload ROM...
        run: |
          #python notify.py upload "${{ github.repository }}" "${{ inputs.input_url }}" "xiaomi" "${{ inputs.builder_name }}" "${{ inputs.builder_id }}"
          sudo -E bash uploadROM.sh
      
      - name: Install 7zip & Jq
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full jq curl

      # ===== CHIA NHỎ FILE NẾU > 9GB =====
      # ===== CHIA NHỎ FILE REPACK NẾU > 9GB =====
      - name: Split Large File
        id: split
        run: |
          # Tự động tìm file .zip thành phẩm trong thư mục out/
          REPACK_FILE=$(ls out/*.zip | head -n 1)
          
          if [ -z "$REPACK_FILE" ] || [ ! -f "$REPACK_FILE" ]; then
            echo "❌ Không tìm thấy file ROM thành phẩm trong thư mục out/"
            exit 1
          fi

          echo "ROM_TARGET=$REPACK_FILE" >> $GITHUB_ENV
          echo "ROM_NAME=$(basename "$REPACK_FILE")" >> $GITHUB_ENV
          echo "File ROM Repack thực tế sẽ xử lý: $REPACK_FILE"
          
          SIZE=$(sudo stat -c%s "$REPACK_FILE")
          LIMIT=$((9 * 1024 * 1024 * 1024))
      
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "File > 9GB, đang chia nhỏ bằng 7z..."
            # Cắt trực tiếp file trong out/ và để các mảnh .7z ở thư mục gốc để dễ upload
            sudo 7z a -t7z -mx=0 -v9g "$(basename "$REPACK_FILE").7z" "$REPACK_FILE"
            echo "split=true" >> $GITHUB_OUTPUT
          else
            echo "File <= 9GB, giữ nguyên khối."
            echo "split=false" >> $GITHUB_OUTPUT
          fi

      # ===== UPLOAD FILE REPACK LÊN PIXELDRAIN =====
      - name: Upload to Pixeldrain
        id: pd
        env:
          PD_API_KEY: ${{ secrets.PIXELDRAIN_API_KEY }}
        run: |
          FILE_PATH="${{ env.ROM_TARGET }}"
          FILE_NAME="${{ env.ROM_NAME }}"

          if [ "${{ steps.split.outputs.split }}" = "true" ]; then
            IDS=""
            LINKS=""
            COUNT=1

            # Quét các mảnh cắt .7z.001, .7z.002 vừa tạo ở thư mục gốc
            for PART in "$FILE_NAME".7z.*; do
              [ -e "$PART" ] || continue
              echo "Uploading part: $PART"
              RESPONSE=$(curl -s -u ":$PD_API_KEY" \
                -F "file=@${PART}" \
                https://pixeldrain.com/api/file)

              ID=$(echo "$RESPONSE" | jq -r '.id')
              if [ "$ID" = "null" ] || [ -z "$ID" ]; then
                echo "❌ Upload failed for $PART"
                echo "$RESPONSE"
                exit 1
              fi

              if [ -z "$LINKS" ]; then
                IDS="$ID"
                LINKS="<a href='https://pixeldrain.com/u/$ID'>Part $COUNT</a>"
              else
                IDS="$IDS,$ID"
                LINKS="$LINKS | <a href='https://pixeldrain.com/u/$ID'>Part $COUNT</a>"
              fi
              COUNT=$((COUNT + 1))
            done

            echo "links=$LINKS" >> $GITHUB_OUTPUT

          else
            echo "Uploading single file: $FILE_PATH"
            RESPONSE=$(curl -s -u ":$PD_API_KEY" \
              -F "file=@${FILE_PATH}" \
              https://pixeldrain.com/api/file)

            ID=$(echo "$RESPONSE" | jq -r '.id')
            if [ "$ID" = "null" ] || [ -z "$ID" ]; then
              echo "❌ Upload failed"
              echo "$RESPONSE"
              exit 1
            fi

            echo "links=<a href='https://pixeldrain.com/u/$ID'>Download</a>" >> $GITHUB_OUTPUT
          fi

      # ===== TELEGRAM NOTIFY REPACK =====
      - name: Notification to Telegram
        run: |
          FILE="${{ env.ROM_NAME }}"
          LINKS="${{ steps.pd.outputs.links }}"
          DEVICE="${{ matrix.device }}"
          REGION="${{ matrix.region }}"

          TEXT=$(cat << EOF
          <b>🚀 New Repack Xiaomi [${DEVICE^^} - ${REGION}] ROM Built Successfully!</b>

          📦 <code>${FILE}</code>

          🔗 ${LINKS}
          EOF
          )

          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHANNEL_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "parse_mode=HTML"
